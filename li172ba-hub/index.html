<!DOCTYPE html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color-scale=1.0, user-scalable=no">
    <title>li_172.br // Central Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #d1d1d1;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-image: radial-gradient(circle at 2px 2px, #161616 1px, transparent 0);
            background-size: 24px 24px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-overflow-scrolling: touch;
            overflow-x: hidden;
        }
        .project-card {
            background: #0a0a0a;
            border: 1px solid #1f1f1f;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease, border-color 0.3s ease;
            cursor: pointer;
        }
        .project-card:active:not(.locked) {
            transform: scale(0.98);
            border-color: #dc2626;
            background: #0d0d0d;
        }
        .locked {
            background: #070707;
            border: 1px dashed #151515;
            cursor: not-allowed;
        }
        .btn-threads:active {
            transform: scale(0.95);
            background: #111;
        }
        
        /* 網頁初次載入的淡入效果 */
        @keyframes masterFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: masterFadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen px-5 py-8 sm:justify-center animate-fade-in">

    <div id="scene-loader" class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-all duration-300 z-50 flex flex-col items-center justify-center space-y-2">
        <div class="text-[10px] text-red-600 font-mono tracking-[0.3em] uppercase opacity-0 transition-opacity duration-200" id="loader-text">
            INITIALIZING_NODE_TRANSFER...
        </div>
        <div class="text-[8px] text-zinc-600 font-mono tracking-widest uppercase opacity-0 transition-opacity duration-200" id="loader-subtext">
            [ LOADING_SUBCONSCIOUS_MATRIX ]
        </div>
    </div>

    <main class="max-w-md w-full text-center space-y-7 my-auto py-4">
        
        <header class="space-y-2.5">
            <div class="text-[9px] text-red-600 font-mono tracking-widest uppercase animate-pulse">
                SYS_STATUS: ACTIVE // LOG_ID: <span id="log-id">7192</span>
            </div>
            
            <h1 class="text-4xl font-black tracking-[0.2em] text-white uppercase pr-[-0.2em]">
                li_172.br
            </h1>
            
            <div class="space-y-1">
                <p class="text-[10px] text-zinc-600 font-mono tracking-[0.3em] uppercase">
                    Project Matrix // Node_2026
                </p>
                <p class="text-xs text-zinc-400 font-sans tracking-wide font-medium">
                    此網站由 "黎" 所有
                </p>
            </div>
        </header>

        <section class="flex flex-col items-center">
            <button data-href="threads://www.threads.net/@li_172.br" 
               id="threads-link"
               class="play-sound btn-threads inline-flex items-center gap-2.5 px-8 py-3.5 border border-zinc-800 rounded-full text-xs text-zinc-300 transition-all font-bold tracking-widest bg-zinc-950/80 active:border-zinc-500 shadow-lg cursor-pointer">
                <span class="text-sm">💬</span> 
                <span>開啟 THREADS APP</span>
            </button>
        </section>

        <hr class="border-zinc-900 w-full max-w-[60%] mx-auto my-2">

        <section class="space-y-4 text-left">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[9px] text-zinc-600 font-mono tracking-[0.25em] uppercase">
                    [ Active_Sub-Nodes ]
                </h3>
                <span class="text-[9px] text-zinc-600 font-mono">
                    ACCESS_Nº: <span id="counter" class="text-zinc-400">128,490</span>
                </span>
            </div>
            
            <button data-href="./1-quiz-social-dark/index.html" class="play-sound text-left w-full block project-card p-6 rounded-xl">
                <div class="flex justify-between items-center mb-2.5">
                    <h2 class="text-sm font-bold text-zinc-200">
                        🔮 社群陰暗面 // 潛意識面具
                    </h2>
                    <span class="text-[9px] font-mono text-emerald-400 bg-emerald-950/30 px-2 py-0.5 rounded border border-emerald-900/40">
                        ONLINE
                    </span>
                </div>
                <p class="text-xs text-zinc-500 leading-relaxed font-sans">
                    探討網路人格背後的集體偽善。解構你在社群網絡與現實面具交織下的潛意識核心流動。
                </p>
            </button>

            <button data-href="./2quiz-iron-fist/index.html" class="play-sound text-left w-full block project-card p-6 rounded-xl">
                <div class="flex justify-between items-center mb-2.5">
                    <h2 class="text-sm font-bold text-zinc-200">
                        🥊 鐵拳教育 // 潛意識人格審判
                    </h2>
                    <span class="text-[9px] font-mono text-red-400 bg-red-950/30 px-2 py-0.5 rounded border border-red-900/40">
                        TRENDING
                    </span>
                </div>
                <p class="text-xs text-zinc-500 leading-relaxed font-sans">
                    配合 Netflix 影集爆紅熱潮。12題高壓盲測情境，審判你在體制霸凌與權力傾軋下的真實人格。
                </p>
            </button>

            <div class="block project-card locked p-6 rounded-xl opacity-30">
                <div class="flex justify-between items-center mb-2.5">
                    <h2 class="text-sm font-bold text-zinc-600">
                        🔒 其他項目開發中
                    </h2>
                    <span class="text-[9px] font-mono text-zinc-600 bg-zinc-950 px-2 py-0.5 rounded border border-zinc-900">
                        COMPILING
                    </span>
                </div>
                <p class="text-xs text-zinc-700 leading-relaxed font-sans">
                    新矩陣節點正在部署中。核心演算法與全新盲測情境編譯中，敬請期待。
                </p>
            </div>
            
        </section>

        <footer class="text-[9px] text-zinc-700 font-mono pt-2 tracking-widest">
            CORE_SYS_V3.6_CINEMATIC // © 2026 li_172.br.
        </footer>
        
    </main>

    <script>
        // 1. 自動生成隨機 LOG ID
        document.getElementById('log-id').innerText = Math.floor(1000 + Math.random() * 9000);

        // 2. 模擬跳動的訪問計數器
        let baseCount = 128490;
        setInterval(() => {
            baseCount += Math.floor(Math.random() * 2);
            document.getElementById('counter').innerText = baseCount.toLocaleString();
        }, 4000);

        // ==========================================
        // 3. 核心音訊驅動引擎
        // ==========================================
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playClickSound() {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(950, now); 
            osc.frequency.exponentialRampToValueAtTime(300, now + 0.12);
            
            gain.gain.setValueAtTime(0.18, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

            osc.start(now);
            osc.stop(now + 0.12);
        }

        // ==========================================
        // 4. 智能阻斷、音效觸發與賽博過場控制
        // ==========================================
        document.querySelectorAll('.play-sound').forEach(element => {
            element.addEventListener('click', function(e) {
                if (this.classList.contains('navigating')) return;
                this.classList.add('navigating');

                playClickSound();
                if (navigator.vibrate) navigator.vibrate(12);

                const targetUrl = this.getAttribute('data-href');
                if (!targetUrl) return;

                if (this.id === 'threads-link') {
                    window.location.href = targetUrl;
                    setTimeout(() => { 
                        window.location.href = "https://www.threads.net/@li_172.br"; 
                    }, 1500);
                    this.classList.remove('navigating');
                    return;
                }

                // ==========================================
                // 5. 子專案卡片過場動畫
                // ==========================================
                const loader = document.getElementById('scene-loader');
                const loaderText = document.getElementById('loader-text');
                const loaderSubtext = document.getElementById('loader-subtext');

                loader.classList.remove('pointer-events-none');
                loader.classList.add('opacity-100');
                
                loaderText.classList.remove('opacity-0');
                loaderSubtext.classList.remove('opacity-0');
                loaderText.classList.add('opacity-100', 'animate-pulse');
                loaderSubtext.classList.add('opacity-100');

                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 300);
            });
        });

        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });
    </script>
</body>
</html>
